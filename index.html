<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A polished picture-book library for Hakan and Yusuf."
    />
    <title>Hakan and Yusuf's Picture Books</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preload" as="image" href="assets/book-cover-cats-of-istanbul.webp" />
    <link rel="preload" as="image" href="assets/book-cover-cats-blue-tile-map.webp" />
    <link rel="preload" as="image" href="assets/book-cover-cats-galata-moon-bell.webp" />
    <link rel="preload" as="image" href="assets/book-cover-little-lost-moon.webp" />
    <link rel="preload" as="image" href="assets/book-cover-kitsune-moon-bridge.webp" />
    <link rel="preload" as="image" href="assets/book-cover-kitsune-star-garden.webp" />
    <link rel="preload" as="image" href="assets/book-cover-kitsune-dawn-crown.webp" />
    <link rel="preload" as="image" href="yusuf/assets/yusie-cover.webp" />
    <link rel="preload" as="image" href="assets/page-01.webp" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="paw-field" aria-hidden="true">
      <span class="paw paw-one"></span>
      <span class="paw paw-two"></span>
      <span class="paw paw-three"></span>
      <span class="paw paw-four"></span>
      <span class="paw paw-five"></span>
      <span class="paw paw-six"></span>
    </div>

    <header class="site-header">
      <p class="kicker" id="siteKicker">Story library</p>
      <h1 id="siteTitle">Hakan and Yusuf's Picture Books</h1>
    </header>

    <main class="app-shell" aria-live="polite">
      <section
        class="library-view"
        id="libraryView"
        aria-labelledby="library-title"
      >
        <div class="library-intro">
          <h2 id="library-title">Choose Tonight's Adventure</h2>
          <p id="libraryDescription">
            Cozy picture-book stories made for curious readers, gentle magic,
            and one more page before sleep.
          </p>
          <button
            type="button"
            class="library-button collection-back-button"
            id="collectionBackButton"
            hidden
          >
            Library
          </button>
        </div>

        <div class="book-grid" id="bookGrid"></div>
      </section>

      <section
        class="storybook"
        id="readerView"
        aria-label="Story reader"
        hidden
      >
      <section class="book-card" aria-labelledby="story-title">
        <div class="progress-wrap" aria-label="Story progress">
          <button type="button" class="library-button" id="libraryButton">
            Library
          </button>
          <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <span id="progressLabel">Page 1 of 10</span>
          <button
            type="button"
            class="fullscreen-button"
            id="fullscreenButton"
            aria-label="Enter full screen"
          >
            Full screen
          </button>
        </div>

        <article class="page-turn" id="page">
          <figure class="illustration-frame">
            <img
              id="storyImage"
              src="assets/page-01.webp"
              alt="Hakan looking out at an Istanbul sunrise from his bedroom window"
              width="1182"
              height="1330"
              decoding="async"
              fetchpriority="high"
            />
          </figure>

          <section class="story-panel" aria-labelledby="story-title">
            <h2 id="story-title">Morning Over Istanbul</h2>
            <div class="story-copy" id="storyText"></div>
          </section>
        </article>

        <div class="controls" aria-label="Story controls">
          <button
            type="button"
            class="nav-button ghost"
            id="backButton"
            aria-label="Previous page"
          >
            <span aria-hidden="true">&#8592;</span>
          </button>
          <button
            type="button"
            class="nav-button"
            id="nextButton"
            aria-label="Next page"
          >
            <span aria-hidden="true">&#8594;</span>
          </button>
        </div>
      </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
